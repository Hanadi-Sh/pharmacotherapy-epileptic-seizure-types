<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epileptic Seizure Types — Interactive Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f8f9fb; font-family:'DM Sans',system-ui,sans-serif; color:#1e293b; }
  .wrap { max-width:960px; margin:0 auto; padding:28px 16px; }
  .title { text-align:center; margin-bottom:22px; }
  .title h1 { font-size:24px; font-weight:800; color:#0f172a; letter-spacing:-0.5px; }
  .title p { color:#94a3b8; font-size:13px; margin-top:4px; font-weight:300; }
  .pills { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .cat-group { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
  .cat-label { font-size:10px; font-weight:800; letter-spacing:1px; padding:3px 10px; border-radius:8px; 
    margin-right:4px; white-space:nowrap; }
  .pill { padding:5px 12px; border-radius:20px; border:1.5px solid #e2e8f0; background:#fff;
    color:#64748b; font-size:11px; font-weight:500; cursor:pointer; transition:all 0.25s; font-family:inherit;
    box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .pill:hover { border-color:#cbd5e1; background:#f8fafc; }
  .pill.on { font-weight:700; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .main { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
  .fig-box { flex:0 0 320px; background:#fff; border-radius:18px; border:1px solid #e2e8f0;
    padding:28px 14px 16px; position:relative; box-shadow:0 4px 24px rgba(0,0,0,0.04); overflow:hidden; }
  .fig-box::before { content:''; position:absolute; top:0; left:0; right:0; height:120px;
    background:linear-gradient(180deg, #f1f5f9 0%, transparent 100%); opacity:0.5; pointer-events:none; }
  .info { flex:1; min-width:260px; display:flex; flex-direction:column; gap:14px; }
  .cat-badge { align-self:flex-start; padding:4px 14px; border-radius:14px; font-size:11px;
    font-weight:700; letter-spacing:0.5px; }
  .info h2 { font-size:26px; font-weight:800; color:#0f172a; letter-spacing:-0.5px; }
  .info .desc { font-size:14px; line-height:1.7; color:#64748b; }
  .ctrl-box { background:#fff; border-radius:14px; padding:16px; border:1px solid #e2e8f0; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
  .prog-bar { width:100%; height:5px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
  .prog-fill { height:100%; border-radius:3px; transition:width 0.05s linear; }
  .btns { display:flex; gap:10px; margin-top:12px; }
  .play-btn { flex:1; padding:10px 0; border-radius:10px; border:none; color:#fff;
    font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:filter 0.2s; }
  .play-btn:hover { filter:brightness(1.1); }
  .replay-btn { padding:10px 16px; border-radius:10px; border:1px solid #e2e8f0;
    background:#fff; color:#64748b; font-size:14px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .replay-btn:hover { background:#f8fafc; border-color:#cbd5e1; }
  .time-label { margin-top:6px; font-size:12px; color:#94a3b8; text-align:center; font-weight:300; }
  
  /* Speed control */
  .speed-row { display:flex; align-items:center; gap:8px; margin-top:10px; justify-content:center; }
  .speed-label { font-size:11px; font-weight:700; color:#94a3b8; letter-spacing:0.8px; }
  .speed-btns { display:flex; gap:4px; }
  .spd-btn { padding:4px 10px; border-radius:8px; border:1.5px solid #e2e8f0; background:#fff;
    color:#64748b; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .spd-btn.active { background:#0f172a; color:#fff; border-color:#0f172a; }
  .spd-btn:hover:not(.active) { background:#f1f5f9; }
  
  .eeg-box { background:#fff; border-radius:14px; padding:14px; border:1px solid #e2e8f0; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
  .eeg-title { font-size:11px; font-weight:700; color:#94a3b8; letter-spacing:1px; margin-bottom:4px; }
  .eeg-desc { font-size:13px; color:#64748b; line-height:1.5; margin-bottom:8px; }
  .tip-box { background:#fffbeb; border-radius:14px; padding:14px; border:1px solid #fde68a;
    font-size:13px; color:#92400e; line-height:1.6; }
  .hl-label { margin-top:8px; text-align:center; background:#f1f5f9; border-radius:10px;
    padding:7px 14px; font-size:12px; font-weight:600; color:#475569; display:none; }
  .phase-tag { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:20;
    color:#fff; padding:4px 18px; border-radius:20px; font-size:11px; font-weight:700;
    letter-spacing:0.8px; white-space:nowrap; display:none; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .footer { text-align:center; margin-top:28px; font-size:11px; color:#cbd5e1; font-weight:300; }
</style>
</head>
<body>
<div class="wrap">
  <div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:12px;">Dr. Hanadi Al Shaker</div>
  <div class="title">
    <h1>Epileptic Seizure Types</h1>
    <p>Interactive muscle movement demonstration — Focal, Generalised & Unknown-Onset types</p>
  </div>
  <div class="pills" id="pills"></div>
  <div class="main">
    <div class="fig-box">
      <div class="phase-tag" id="phaseTag"></div>
      <svg id="figure" viewBox="0 0 260 600" style="width:100%;max-width:290px;display:block;margin:0 auto;"></svg>
      <div class="hl-label" id="hlLabel"></div>
    </div>
    <div class="info">
      <div class="cat-badge" id="catBadge"></div>
      <h2 id="szTitle"></h2>
      <p class="desc" id="szDesc"></p>
      <div class="ctrl-box">
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        <div class="btns">
          <button class="play-btn" id="playBtn" onclick="toggle()">▶  Play</button>
          <button class="replay-btn" onclick="doReplay()">↺</button>
        </div>
        <div class="time-label" id="timeLabel">0.0s / 0.0s</div>
        <div class="speed-row">
          <span class="speed-label">SPEED</span>
          <div class="speed-btns" id="speedBtns">
            <button class="spd-btn" data-spd="0.5">0.5×</button>
            <button class="spd-btn active" data-spd="1">1×</button>
            <button class="spd-btn" data-spd="1.5">1.5×</button>
            <button class="spd-btn" data-spd="2">2×</button>
            <button class="spd-btn" data-spd="3">3×</button>
          </div>
        </div>
      </div>
      <div class="eeg-box">
        <div class="eeg-title">EEG PATTERN</div>
        <div class="eeg-desc" id="eegDesc"></div>
        <canvas id="eegCanvas" width="300" height="44" style="width:100%;border-radius:6px;"></canvas>
      </div>
      <div class="tip-box" id="tipBox"></div>
    </div>
  </div>
  <div class="footer">For educational purposes only — animations are simplified representations</div>
</div>

<script>
const SZ = [
  { id:"tonic-clonic", label:"Tonic-Clonic", cat:"Motor Generalised",
    desc:"Initial whole-body stiffening (tonic) with arms extending rigidly outward, back arching, and jaw clenching, followed by rhythmic bilateral jerking (clonic) that gradually slows. The most dramatic seizure type.",
    dur:7000, tip:"Most recognisable seizure. Tonic phase ~10-20s, clonic phase ~30-60s. Post-ictal confusion and fatigue follow." },
  { id:"tonic", label:"Tonic", cat:"Motor Generalised",
    desc:"Sustained muscle contraction causes whole-body rigidity. Arms extend rigidly outward and abducted from the body, back arches, jaw clenches. Trunk and proximal muscles are predominantly affected.",
    dur:4500, tip:"Can cause falls if standing. Often occurs during sleep. Arms extend rigidly outward from the body." },
  { id:"clonic", label:"Clonic", cat:"Motor Generalised",
    desc:"Rhythmic bilateral jerking of all limbs. Frequency starts fast then gradually slows (decrescendo pattern). No preceding stiffening phase.",
    dur:4500, tip:"Rare in isolation — more common as part of a tonic-clonic sequence. Jerking decelerates over time." },
  { id:"myoclonic", label:"Myoclonic", cat:"Motor Generalised",
    desc:"Very brief (<100ms) arrhythmic, shock-like jerks predominantly affecting shoulders and arms. The jerk throws the arms outward/upward suddenly.",
    dur:3500, tip:"So brief it can be mistaken for clumsiness. Often occurs after waking. Can cause objects to be flung from hands." },
  { id:"atonic", label:"Atonic", cat:"Motor Generalised",
    desc:"Sudden complete loss of all muscle tone. Head drops first, then knees buckle, then full collapse — known as 'drop attacks'. Like a puppet with cut strings.",
    dur:3500, tip:"High injury risk from sudden unbraced falls. Patients may wear protective helmets. Recovery is rapid." },
  { id:"spasms", label:"Epileptic Spasms", cat:"Motor Generalised",
    desc:"Sudden flexion of trunk and arms in a jackknife pattern — head drops forward, trunk curls, arms abduct then flex inward. Occurs in clusters.",
    dur:4000, tip:"Most common in the first year of life. Clusters of 10-40 spasms are typical. Associated with West syndrome." },
  { id:"absence", label:"Absence", cat:"Nonmotor Generalised",
    desc:"Sudden arrest of behaviour. Patient stares blankly with brief upward rotation of the eyes, lasting 2 to 30 seconds. May have subtle eyelid fluttering and slight head nodding. No fall, no postictal confusion.",
    dur:4000, tip:"Often mistaken for daydreaming. No fall or convulsion occurs. Returns to previous activity immediately as if nothing happened." },
  { id:"focal", label:"Focal Aware", cat:"Focal",
    desc:"Seizure activity confined to one brain region. One arm or hand jerks rhythmically while the rest of the body remains completely normal. Patient stays fully conscious.",
    dur:4000, tip:"Patient remains fully aware and can describe the experience. May show Jacksonian march — jerking spreads proximally." },
  { id:"focal-btc", label:"Focal → Bilateral", cat:"Focal",
    desc:"Begins as focal seizure (one arm jerking), then electrical activity spreads across the corpus callosum to the other hemisphere — becoming a full bilateral tonic-clonic.",
    dur:8000, tip:"Treatment targets the focal origin. Transition phase shows progressive bilateral involvement before full tonic-clonic." },
  { id:"focal-impaired", label:"Focal Impaired Awareness", cat:"Focal",
    desc:"Seizure originates in a localised brain region but impairs consciousness. Patient appears confused, stares, and exhibits automatisms — automatic behaviours such as lip smacking, chewing, or picking at clothing. After the event, may not recall actions.",
    dur:5500, tip:"Most common type of focal seizure. Patient has no memory of the event. Automatisms are the hallmark clinical feature. Often originates in the temporal lobe." },
  { id:"focal-nonmotor", label:"Focal Nonmotor", cat:"Focal",
    desc:"Focal seizure without prominent motor activity. Patient may experience autonomic changes (flushing, sweating, piloerection, salivation, pallor), behaviour arrest (pausing, freezing mid-activity), cognitive symptoms (language problems, thinking problems, feelings of familiarity [déjà vu] or unfamiliarity [jamais vu]), emotional symptoms (sudden fear, depression, joy, anger), or sensory phenomena (numbness, tingling, ringing/buzzing sounds, smells, tastes, visual hallucinations, vertigo).",
    dur:4500, tip:"Can be subtle and easily missed. Includes autonomic, behaviour arrest, cognitive, emotional, and sensory subtypes. Patient remains aware in this demonstration." },
  { id:"atypical-absence", label:"Atypical Absence", cat:"Nonmotor Generalised",
    desc:"Similar to typical absence but with more gradual onset and offset. May include subtle motor features like mild head nodding, slight body slumping, and more pronounced loss of tone. Episodes last longer than typical absence.",
    dur:5000, tip:"More gradual than typical absence — harder to identify exact start/end. Often seen in Lennox-Gastaut syndrome. Associated with slow spike-wave on EEG (~1.5-2.5 Hz)." },
  { id:"myoclonic-absence", label:"Myoclonic Absence", cat:"Nonmotor Generalised",
    desc:"Combines the unresponsive stare of an absence seizure with rhythmic myoclonic jerks of the shoulders and arms. Arms elevate gradually with each jerk while the patient remains unresponsive.",
    dur:5000, tip:"Rare subtype. Rhythmic arm jerks are time-locked to the 3 Hz spike-wave discharges on EEG. Arms abduct and elevate progressively. May be treatment-resistant." },
  { id:"eyelid-myoclonia", label:"Eyelid Myoclonia", cat:"Nonmotor Generalised",
    desc:"Rapid, rhythmic jerking of the eyelids, often with upward deviation of the eyes and brief head extension. Typically triggered by eye closure or photic stimulation. Awareness may or may not be impaired.",
    dur:4000, tip:"Hallmark of Jeavons syndrome. Characteristically provoked by eye closure. EEG shows generalised polyspike-and-wave discharges. Very photosensitive." },
  { id:"unknown-tc", label:"Unknown Tonic-Clonic", cat:"Unknown Onset",
    desc:"A tonic-clonic seizure where the onset — focal or generalised — could not be determined. This may be because the event was unwitnessed, EEG was not recorded, or clinical features were ambiguous.",
    dur:6000, tip:"May be reclassified as focal or generalised once more data is available (e.g. video-EEG monitoring). Treatment decisions are guided by the best available clinical evidence." },
  { id:"unknown-spasms", label:"Unknown Epileptic Spasms", cat:"Unknown Onset",
    desc:"Epileptic spasms where the onset type is undetermined. Sudden flexion or extension of the body occurring in clusters, but insufficient data to classify as focal or generalised in origin.",
    dur:4000, tip:"Further investigation with video-EEG may clarify the onset. Spasms may be reclassified once the underlying aetiology is better understood." },
  { id:"unknown-arrest", label:"Unknown Behaviour Arrest", cat:"Unknown Onset",
    desc:"Sudden cessation of all activity — the patient freezes mid-action and becomes unresponsive. Onset type (focal or generalised) cannot be determined from available clinical information.",
    dur:4000, tip:"May resemble absence or focal behaviour arrest. Classification may change with further EEG monitoring or clinical data." },
];

const CC = { "Motor Generalised":"#dc2626", "Nonmotor Generalised":"#64748b", "Focal":"#0891b2", "Unknown Onset":"#7c3aed" };

// Enhanced skin palette for 3D effect
const skin="#EDCBA8", skinL="#F7E2CC", skinH="#FAECD8", skinM="#E0B890", skinS="#C9976A", skinD="#B8845C";
const hair="#1A1209", hairH="#2D2010";
const shortsC="#5B6370", shortsB="#7E8694", shortsD="#3F4550", shortsH="#8D95A3";

let sel=0, playing=false, elapsed=0, afId=null, startT=null, speed=1;

// Build pills grouped by category
const pillsEl = document.getElementById("pills");
const catGroups = [
  { label:"FOCAL", cats:["Focal"], color:"#0891b2" },
  { label:"GENERALISED", cats:["Motor Generalised","Nonmotor Generalised"], color:"#dc2626" },
  { label:"UNKNOWN ONSET", cats:["Unknown Onset"], color:"#7c3aed" },
];
catGroups.forEach(grp => {
  const row = document.createElement("div");
  row.className = "cat-group";
  const lbl = document.createElement("span");
  lbl.className = "cat-label";
  lbl.textContent = grp.label;
  lbl.style.cssText = `color:${grp.color};background:${grp.color}10;border:1.5px solid ${grp.color}25;`;
  row.appendChild(lbl);
  SZ.forEach((s,i) => {
    if (!grp.cats.includes(s.cat)) return;
    const b = document.createElement("button");
    b.className = "pill"; b.textContent = s.label;
    b.dataset.idx = i;
    b.onclick = () => pick(i);
    row.appendChild(b);
  });
  pillsEl.appendChild(row);
});

// Speed buttons
document.getElementById("speedBtns").addEventListener("click", (e) => {
  const btn = e.target.closest(".spd-btn");
  if (!btn) return;
  speed = parseFloat(btn.dataset.spd);
  document.querySelectorAll(".spd-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  // Adjust animation timing if playing
  if (playing) { startT = performance.now() - elapsed / speed; }
});

function pick(i) { playing=false; elapsed=0; if(afId) cancelAnimationFrame(afId); sel=i; updateUI(); render(); }
function toggle() {
  if (elapsed >= SZ[sel].dur) { elapsed=0; startT=null; }
  playing = !playing;
  if (playing) startAnim(); else { if(afId) cancelAnimationFrame(afId); }
  updateUI();
}
function doReplay() { playing=false; elapsed=0; if(afId) cancelAnimationFrame(afId); setTimeout(()=>{ playing=true; startAnim(); updateUI(); },50); updateUI(); }

function startAnim() {
  startT = performance.now() - elapsed / speed;
  function tick(now) {
    elapsed = (now - startT) * speed;
    if (elapsed >= SZ[sel].dur) { elapsed = SZ[sel].dur; playing = false; updateUI(); render(); return; }
    render(); updateUI();
    afId = requestAnimationFrame(tick);
  }
  afId = requestAnimationFrame(tick);
}

function updateUI() {
  const sz = SZ[sel], cc = CC[sz.cat], prog = sz.dur>0?Math.min(elapsed/sz.dur,1):0;
  document.querySelectorAll(".pill").forEach((p) => {
    const i = parseInt(p.dataset.idx);
    const on = i===sel, c = CC[SZ[i].cat];
    p.className = "pill" + (on?" on":"");
    p.style.borderColor = on?c:"#e2e8f0";
    p.style.background = on?c+"14":"#fff";
    p.style.color = on?c:"#64748b";
  });
  document.getElementById("catBadge").textContent = sz.cat.toUpperCase();
  document.getElementById("catBadge").style.cssText = `align-self:flex-start;padding:4px 14px;border-radius:14px;font-size:11px;font-weight:700;letter-spacing:0.5px;background:${cc}10;color:${cc};border:1.5px solid ${cc}30;`;
  document.getElementById("szTitle").textContent = sz.label;
  document.getElementById("szDesc").textContent = sz.desc;
  document.getElementById("progFill").style.width = (prog*100)+"%";
  document.getElementById("progFill").style.background = cc;
  const pb = document.getElementById("playBtn");
  pb.style.background = cc;
  pb.textContent = playing?"⏸  Pause":elapsed>=sz.dur?"▶  Replay":"▶  Play";
  document.getElementById("timeLabel").textContent = (elapsed/1000).toFixed(1)+"s / "+(sz.dur/1000).toFixed(1)+"s";
  document.getElementById("eegDesc").textContent = sz.cat.includes("Generalised")?"Bilateral synchronous discharge — both hemispheres":sz.cat==="Unknown Onset"?"Onset type undetermined — insufficient data to classify":sz.cat==="Focal"?"Focal onset — localised brain region":"Focal onset — localised brain region";
  document.getElementById("tipBox").innerHTML = "<strong>Key point: </strong>"+sz.tip;
  
  const hl = playing ? getHL(sz.id, prog) : null;
  const pt = document.getElementById("phaseTag");
  const ll = document.getElementById("hlLabel");
  if (hl && hl.ph) { pt.style.display="block"; pt.style.background=hl.pc; pt.textContent=hl.ph; } else { pt.style.display="none"; }
  if (hl && hl.l) { ll.style.display="block"; ll.textContent=hl.l; } else { ll.style.display="none"; }
  drawEEG(sz.id, playing, elapsed, cc);
}

function getHL(id, p) {
  const all=["head","torso","lArm","rArm","lLeg","rLeg"];
  switch(id) {
    case "tonic-clonic": return p<0.35?{p:all,c:"#ef4444",l:"TONIC — Arms extending rigid & outward, back arching, jaw clenching",ph:"TONIC PHASE",pc:"#dc2626"}:p<0.4?{p:all,c:"#f59e0b",l:"TRANSITION — Stiffness breaking into tremor",ph:"TRANSITION",pc:"#d97706"}:{p:all,c:"#eab308",l:"CLONIC — Bilateral rhythmic jerking, gradually slowing",ph:"CLONIC PHASE",pc:"#ca8a04"};
    case "tonic": return {p:all,c:"#ef4444",l:"All muscles — arms rigid outward, back arched, jaw clenched"};
    case "clonic": return {p:all,c:"#eab308",l:"All muscles — bilateral rhythmic jerking (decrescendo)"};
    case "myoclonic": return {p:["lArm","rArm","torso","head"],c:"#8b5cf6",l:"Shoulders & arms — lightning-fast shock jerks"};
    case "atonic": return p<0.2?{p:all,c:"#6366f1",l:"All tone lost — body beginning to drop",ph:"DROP ATTACK",pc:"#4f46e5"}:{p:all,c:"#6366f1",l:"Complete collapse — falling to ground",ph:"COLLAPSE",pc:"#4338ca"};
    case "spasms": return {p:["torso","lArm","rArm","head"],c:"#ec4899",l:"Flexor spasm — trunk curling, arms abducting"};
    case "absence": return {p:["head"],c:"#94a3b8",l:"Behaviour arrest — blank stare, upward eye rotation, subtle lid flutter"};
    case "focal": return {p:["rArm"],c:"#06b6d4",l:"Right arm only — rhythmic localised jerking"};
    case "focal-btc": return p<0.3?{p:["rArm"],c:"#06b6d4",l:"Focal — right arm rhythmic jerking",ph:"FOCAL ONSET",pc:"#0891b2"}:p<0.45?{p:["rArm","torso","head"],c:"#f59e0b",l:"Spreading — activity reaching midline",ph:"SPREADING",pc:"#d97706"}:p<0.55?{p:all,c:"#ef4444",l:"Bilateral tonic — whole-body stiffening",ph:"BILATERAL TONIC",pc:"#dc2626"}:{p:all,c:"#eab308",l:"Bilateral clonic — rhythmic bilateral jerking",ph:"BILATERAL CLONIC",pc:"#ca8a04"};
    case "focal-impaired": return {p:["head","lArm","torso"],c:"#0891b2",l:"Impaired awareness — automatisms (lip smacking, chewing, picking at clothing)",ph:"AUTOMATISMS",pc:"#0891b2"};
    case "focal-nonmotor": return {p:["head","torso"],c:"#06b6d4",l:"Behaviour arrest — pausing, freezing, autonomic changes (flushing, sweating, piloerection, salivation, pallor)"};
    case "atypical-absence": return {p:["head","torso","lArm","rArm"],c:"#94a3b8",l:"Atypical absence — gradual onset, subtle tone loss, slumping",ph:"ATYPICAL ABSENCE",pc:"#64748b"};
    case "myoclonic-absence": return {p:["head","lArm","rArm"],c:"#94a3b8",l:"Myoclonic absence — rhythmic arm jerks with staring",ph:"MYOCLONIC JERKS",pc:"#64748b"};
    case "eyelid-myoclonia": return {p:["head"],c:"#94a3b8",l:"Eyelid myoclonia — rapid eyelid jerks, head extension",ph:"EYELID JERKS",pc:"#64748b"};
    case "unknown-tc": return p<0.35?{p:all,c:"#8b5cf6",l:"TONIC — whole-body stiffening (onset unknown)",ph:"TONIC PHASE",pc:"#7c3aed"}:p<0.42?{p:all,c:"#f59e0b",l:"TRANSITION",ph:"TRANSITION",pc:"#d97706"}:{p:all,c:"#a78bfa",l:"CLONIC — bilateral rhythmic jerking (onset unknown)",ph:"CLONIC PHASE",pc:"#7c3aed"};
    case "unknown-spasms": return {p:["torso","lArm","rArm","head"],c:"#8b5cf6",l:"Flexor spasm — trunk curling, arms abducting (onset unknown)"};
    case "unknown-arrest": return {p:["head"],c:"#8b5cf6",l:"Behaviour arrest — frozen, unresponsive (onset unknown)"};
    default: return {p:[],c:"",l:""};
  }
}

/* ========== CORRECTED ANATOMICAL ANIMATIONS ========== */
/* IMPORTANT: Arms pivot around shoulder joints via ROTATION ONLY.
   Left arm pivot: (82, 112). Negative r = swing outward/left. 
   Right arm pivot: (178, 112). Positive r = swing outward/right.
   NEVER use large ty on arms — it shifts the drawn-hanging-arm onto the head!
   
   Clinical tonic posture: arms ABDUCT OUTWARD from body, rigid and extended.
   ~50-70° rotation = arms extend horizontally outward. 
   jawClench: 0 = relaxed, 1 = fully clenched */

function getAnim(id, t, dur) {
  const p = dur>0 ? Math.min(t/dur, 1) : 0;
  const Z = {head:{},torso:{},lArm:{},rArm:{},lLeg:{},rLeg:{},jawClench:0};

  switch(id) {

    /* TONIC-CLONIC: 
       Tonic = arms extend rigidly OUTWARD (abducted), back arches, jaw clenches
       Clonic = bilateral rhythmic jerking that decelerates
       LEFT ARM OUTWARD = positive r.  RIGHT ARM OUTWARD = negative r. */
    case "tonic-clonic": {
      const tonicEnd = 0.35, transEnd = 0.42;
      if (p < tonicEnd) {
        const s = Math.min(p / tonicEnd * 1.5, 1);
        const ease = 1 - Math.pow(1 - s, 2);
        return {
          head: { ty: -ease*6, r: -ease*5 },
          torso: { sy: 1 + ease*0.03, r: -ease*3 },
          lArm: { r: ease*45, tx: -ease*8 },
          rArm: { r: -ease*45, tx: ease*8 },
          lLeg: { r: -ease*7, sy: 1 + ease*0.02 },
          rLeg: { r: ease*7, sy: 1 + ease*0.02 },
          jawClench: ease
        };
      }
      if (p < transEnd) {
        const tr = (p - tonicEnd) / (transEnd - tonicEnd);
        const tremor = Math.sin(t * 0.06) * 5 * tr;
        return {
          head: { ty: -6 + tremor*0.3, r: -5 + tremor*0.6 },
          torso: { sy: 1.03, r: -3 + tremor*0.4 },
          lArm: { r: 45 + tremor*2, tx: -8 },
          rArm: { r: -45 + tremor*2, tx: 8 },
          lLeg: { r: -7 + tremor*0.8, sy: 1.02 },
          rLeg: { r: 7 + tremor*0.8, sy: 1.02 },
          jawClench: 1
        };
      }
      const clonicP = (p - transEnd) / (1 - transEnd);
      const decel = 1 - clonicP * 0.6;
      const freq = 0.03 - clonicP * 0.015;
      const j = Math.sin(t * freq * speed) * 14 * decel;
      const k = Math.cos(t * freq * 0.8 * speed) * 12 * decel;
      const armExt = 45 * (1 - clonicP * 0.6);
      const jawPulse = (Math.sin(t * freq * speed * 1.5) + 1) * 0.35 * decel;
      return {
        head: { tx: j*0.4, ty: -4*(1-clonicP*0.5), r: j*0.8 },
        torso: { tx: j*0.2, r: j*0.5 },
        lArm: { r: armExt + j*3, tx: -(8*(1-clonicP*0.6)) },
        rArm: { r: -armExt + k*3, tx: 8*(1-clonicP*0.6) },
        lLeg: { r: -7*(1-clonicP*0.3) + j*1.2, tx: j*0.3 },
        rLeg: { r: 7*(1-clonicP*0.3) + k*1.2, tx: k*0.3 },
        jawClench: jawPulse
      };
    }

    /* TONIC: Arms extend rigidly OUTWARD, back arches, jaw clenches hard */
    case "tonic": {
      const rampUp = Math.min(p * 4, 1);
      const ease = 1 - Math.pow(1 - rampUp, 3);
      const tremor = rampUp > 0.5 ? Math.sin(t * 0.04) * 2 * ease : 0;
      return {
        head: { ty: -ease*8, r: -ease*7 + tremor*0.4 },
        torso: { sy: 1 + ease*0.04, r: -ease*5 + tremor*0.3 },
        lArm: { r: ease*50 + tremor, tx: -ease*10 },
        rArm: { r: -ease*50 + tremor, tx: ease*10 },
        lLeg: { r: -ease*10, sy: 1 + ease*0.02 },
        rLeg: { r: ease*10, sy: 1 + ease*0.02 },
        jawClench: ease
      };
    }

    /* CLONIC: Bilateral rhythmic jerking that decelerates */
    case "clonic": {
      const decel = 1 - p * 0.5;
      const freqMod = 1 - p * 0.4;
      const j = Math.sin(t * 0.028 * freqMod) * 16 * decel;
      const k = Math.cos(t * 0.033 * freqMod) * 14 * decel;
      const jawPulse = (Math.sin(t * 0.028 * freqMod * 1.3) + 1) * 0.3 * decel;
      return {
        head: { tx: j*0.4, r: j*0.7 },
        torso: { tx: j*0.2, r: j*0.4 },
        lArm: { r: 10 + j*3 },
        rArm: { r: -10 + k*3 },
        lLeg: { r: j*1.3, tx: j*0.3 },
        rLeg: { r: k*1.3, tx: k*0.3 },
        jawClench: jawPulse
      };
    }

    /* MYOCLONIC: Brief shock-like jerks — arms flung OUTWARD suddenly.
       LEFT ARM OUTWARD = positive r.  RIGHT ARM OUTWARD = negative r. */
    case "myoclonic": {
      const cycle = (t % 900) / 900;
      let sp = 0;
      if (cycle < 0.08) sp = Math.sin(cycle / 0.08 * Math.PI * 0.5);
      else if (cycle < 0.15) sp = Math.cos((cycle - 0.08) / 0.07 * Math.PI * 0.5);
      else if (cycle < 0.22) sp = -Math.sin((cycle - 0.15) / 0.07 * Math.PI) * 0.15;
      
      return {
        head: { ty: -Math.abs(sp)*8, r: sp*3 },
        torso: { ty: -Math.abs(sp)*5 },
        lArm: { r: sp*50, tx: -sp*15 },
        rArm: { r: -sp*50, tx: sp*15 },
        lLeg: { ty: -Math.abs(sp)*3 },
        rLeg: { ty: -Math.abs(sp)*3 },
        jawClench: Math.abs(sp) * 0.4
      };
    }

    /* ATONIC: Body drops straight DOWN as a unit */
    case "atonic": {
      const drop = Math.min(p * 2.5, 1);
      const grav = drop * drop;
      const fallDist = grav * 70;
      
      return {
        head: { ty: fallDist + grav*8, r: grav*25 },
        torso: { ty: fallDist, r: grav*12 },
        lArm: { ty: fallDist, r: grav*8 },
        rArm: { ty: fallDist, r: -grav*5 },
        lLeg: { r: grav*12 },
        rLeg: { r: -grav*12 },
        jawClench: 0
      };
    }

    /* EPILEPTIC SPASMS: Flexor spasm — trunk curls, arms abduct OUTWARD */
    case "spasms": {
      const cycle = (t % 1200) / 1200;
      let f = 0;
      if (cycle < 0.12) f = Math.sin(cycle / 0.12 * Math.PI * 0.5);
      else if (cycle < 0.25) f = Math.cos((cycle - 0.12) / 0.13 * Math.PI * 0.5);
      
      return {
        head: { r: f*20, ty: f*10 },
        torso: { r: f*18, ty: f*6, sy: 1-f*0.02 },
        lArm: { r: f*40 },
        rArm: { r: -f*40 },
        lLeg: { r: f*14 },
        rLeg: { r: -f*14 },
        jawClench: f * 0.5
      };
    }

    /* ABSENCE: Blank stare, eyelid flutter, slight head nod, slack mouth */
    case "absence": {
      const nod = Math.sin(t * 0.005) * 4;
      const droop = Math.min(p * 3, 1) * 3;
      const mouthSlack = Math.min(p * 4, 1);
      return { 
        head: { r: nod, ty: Math.abs(nod) * 0.5 },
        torso: {},
        lArm: { r: droop },
        rArm: { r: -droop },
        lLeg: {}, 
        rLeg: {}, 
        jawClench: 0,
        absenceMouth: mouthSlack,
      };
    }

    /* FOCAL AWARE: Only right arm jerks rhythmically */
    case "focal": {
      const j = Math.sin(t * 0.025) * 14;
      const wrist = Math.sin(t * 0.04) * 8;
      return {
        ...Z,
        rArm: { r: j*2 + wrist*0.5 }
      };
    }

    /* FOCAL→BILATERAL: Focal right arm → spread → bilateral tonic-clonic */
    case "focal-btc": {
      const focalEnd = 0.3, spreadEnd = 0.45, tonicEnd2 = 0.55;
      
      if (p < focalEnd) {
        const j = Math.sin(t * 0.025) * 12;
        return { ...Z, rArm: { r: j*2.5 } };
      }
      if (p < spreadEnd) {
        const sp = (p - focalEnd) / (spreadEnd - focalEnd);
        const ease = 1 - Math.pow(1 - sp, 2);
        const j = Math.sin(t * 0.025) * 14;
        return {
          head: { r: -ease*4, tx: ease*3 },
          torso: { r: ease*2 },
          lArm: { r: j * ease * 1.5 + ease*10 },
          rArm: { r: j*2.5 - ease*10 },
          lLeg: { r: j * ease * 0.5 },
          rLeg: { r: j * ease * 0.5 },
          jawClench: ease * 0.4
        };
      }
      if (p < tonicEnd2) {
        const tp = (p - spreadEnd) / (tonicEnd2 - spreadEnd);
        const ease = 1 - Math.pow(1 - tp, 2);
        const tremor = Math.sin(t * 0.05) * 2 * ease;
        return {
          head: { ty: -ease*6, r: -ease*5 + tremor },
          torso: { sy: 1 + ease*0.03, r: -ease*3 },
          lArm: { r: ease*45 + tremor, tx: -ease*8 },
          rArm: { r: -ease*45 + tremor, tx: ease*8 },
          lLeg: { r: -ease*7 },
          rLeg: { r: ease*7 },
          jawClench: ease
        };
      }
      const cp = (p - tonicEnd2) / (1 - tonicEnd2);
      const decel = 1 - cp * 0.5;
      const freq = 0.028 - cp * 0.012;
      const j = Math.sin(t * freq) * 14 * decel;
      const k = Math.cos(t * freq * 0.85) * 12 * decel;
      const armExt = 45 * (1 - cp * 0.55);
      const jawPulse = (Math.sin(t * freq * 1.4) + 1) * 0.3 * decel;
      return {
        head: { tx: j*0.4, ty: -4*(1-cp*0.5), r: j*0.7 },
        torso: { tx: j*0.2, r: j*0.4 },
        lArm: { r: armExt + j*2.5 },
        rArm: { r: -armExt + k*2.5 },
        lLeg: { r: j*1.1 },
        rLeg: { r: k*1.1 },
        jawClench: jawPulse
      };
    }

    /* FOCAL IMPAIRED AWARENESS: Confused stare + automatisms (hand fumbling, head turning) */
    case "focal-impaired": {
      const onset = Math.min(p * 5, 1);
      const autoRhythm = Math.sin(t * 0.012) * onset;
      const handFumble = Math.sin(t * 0.02) * 8 * onset;
      const headTurn = Math.sin(t * 0.006) * 10 * onset;
      const lipSmack = (Math.sin(t * 0.025) + 1) * 0.3 * onset;
      return {
        head: { r: headTurn, ty: Math.abs(autoRhythm) * 2 },
        torso: { r: autoRhythm * 3 },
        lArm: { r: 15 * onset + handFumble },
        rArm: { r: -8 * onset + Math.sin(t * 0.015) * 5 * onset },
        lLeg: {},
        rLeg: {},
        jawClench: 0,
        absenceMouth: lipSmack,
      };
    }

    /* FOCAL NONMOTOR: Behaviour arrest — patient freezes, subtle autonomic signs */
    case "focal-nonmotor": {
      const freeze = Math.min(p * 4, 1);
      const subtle = Math.sin(t * 0.004) * 1.5 * freeze;
      const flush = freeze;
      return {
        head: { r: subtle, ty: freeze * 1.5 },
        torso: {},
        lArm: { r: freeze * 3 },
        rArm: { r: -freeze * 3 },
        lLeg: {},
        rLeg: {},
        jawClench: 0,
        absenceMouth: freeze * 0.3,
      };
    }

    /* ATYPICAL ABSENCE: Gradual onset, subtle tone loss, significant slump */
    case "atypical-absence": {
      const gradual = Math.min(p * 2.5, 1);
      const slump = gradual * gradual;
      const nod = Math.sin(t * 0.004) * 3 * slump;
      const toneLoss = slump * 10;
      return {
        head: { r: nod + slump * 15, ty: slump * 4 },
        torso: { r: slump * 8, ty: slump * 3 },
        lArm: { r: toneLoss + 5 * slump + nod * 0.3 },
        rArm: { r: -(toneLoss + 3 * slump) + nod * 0.2 },
        lLeg: {},
        rLeg: {},
        jawClench: 0,
        absenceMouth: slump * 0.8,
      };
    }

    /* MYOCLONIC ABSENCE: Staring + rhythmic arm jerks that elevate arms */
    case "myoclonic-absence": {
      const onset = Math.min(p * 3, 1);
      const jerkCycle = Math.sin(t * 0.019);
      const jerk = jerkCycle > 0.5 ? (jerkCycle - 0.5) * 2 : 0;
      const elevation = p * 25 * onset;
      return {
        head: { r: Math.sin(t * 0.005) * 3 * onset, ty: onset * 2 },
        torso: { ty: jerk * 3 * onset },
        lArm: { r: elevation + jerk * 12 * onset, tx: -onset * 4 },
        rArm: { r: -(elevation + jerk * 12 * onset), tx: onset * 4 },
        lLeg: {},
        rLeg: {},
        jawClench: 0,
        absenceMouth: onset * 0.5,
      };
    }

    /* EYELID MYOCLONIA: Rapid eyelid jerking, slight head extension */
    case "eyelid-myoclonia": {
      const onset = Math.min(p * 4, 1);
      const headExt = -onset * 3;
      const flicker = Math.sin(t * 0.04) * 2 * onset;
      return {
        head: { ty: headExt + flicker * 0.3, r: flicker * 0.5 },
        torso: {},
        lArm: { r: onset * 2 },
        rArm: { r: -onset * 2 },
        lLeg: {},
        rLeg: {},
        jawClench: 0,
        eyelidMyoclonia: onset,
      };
    }

    /* UNKNOWN TONIC-CLONIC: Same presentation as tonic-clonic, unknown origin */
    case "unknown-tc": {
      const tonicEnd = 0.35, transEnd = 0.42;
      if (p < tonicEnd) {
        const s = Math.min(p / tonicEnd * 1.5, 1);
        const ease = 1 - Math.pow(1 - s, 2);
        return {
          head: { ty: -ease*6, r: -ease*5 },
          torso: { sy: 1 + ease*0.03, r: -ease*3 },
          lArm: { r: ease*45, tx: -ease*8 },
          rArm: { r: -ease*45, tx: ease*8 },
          lLeg: { r: -ease*7, sy: 1 + ease*0.02 },
          rLeg: { r: ease*7, sy: 1 + ease*0.02 },
          jawClench: ease
        };
      }
      if (p < transEnd) {
        const tr = (p - tonicEnd) / (transEnd - tonicEnd);
        const tremor = Math.sin(t * 0.06) * 5 * tr;
        return {
          head: { ty: -6 + tremor*0.3, r: -5 + tremor*0.6 },
          torso: { sy: 1.03, r: -3 + tremor*0.4 },
          lArm: { r: 45 + tremor*2, tx: -8 },
          rArm: { r: -45 + tremor*2, tx: 8 },
          lLeg: { r: -7 + tremor*0.8, sy: 1.02 },
          rLeg: { r: 7 + tremor*0.8, sy: 1.02 },
          jawClench: 1
        };
      }
      const clonicP = (p - transEnd) / (1 - transEnd);
      const decel2 = 1 - clonicP * 0.6;
      const freq2 = 0.03 - clonicP * 0.015;
      const j2 = Math.sin(t * freq2 * speed) * 14 * decel2;
      const k2 = Math.cos(t * freq2 * 0.8 * speed) * 12 * decel2;
      const armExt2 = 45 * (1 - clonicP * 0.6);
      const jawPulse2 = (Math.sin(t * freq2 * speed * 1.5) + 1) * 0.35 * decel2;
      return {
        head: { tx: j2*0.4, ty: -4*(1-clonicP*0.5), r: j2*0.8 },
        torso: { tx: j2*0.2, r: j2*0.5 },
        lArm: { r: armExt2 + j2*3, tx: -(8*(1-clonicP*0.6)) },
        rArm: { r: -armExt2 + k2*3, tx: 8*(1-clonicP*0.6) },
        lLeg: { r: -7*(1-clonicP*0.3) + j2*1.2, tx: j2*0.3 },
        rLeg: { r: 7*(1-clonicP*0.3) + k2*1.2, tx: k2*0.3 },
        jawClench: jawPulse2
      };
    }

    /* UNKNOWN EPILEPTIC SPASMS: Same as spasms, unknown origin */
    case "unknown-spasms": {
      const cycle = (t % 1200) / 1200;
      let f = 0;
      if (cycle < 0.12) f = Math.sin(cycle / 0.12 * Math.PI * 0.5);
      else if (cycle < 0.25) f = Math.cos((cycle - 0.12) / 0.13 * Math.PI * 0.5);
      return {
        head: { r: f*20, ty: f*10 },
        torso: { r: f*18, ty: f*6, sy: 1-f*0.02 },
        lArm: { r: f*40 },
        rArm: { r: -f*40 },
        lLeg: { r: f*14 },
        rLeg: { r: -f*14 },
        jawClench: f * 0.5
      };
    }

    /* UNKNOWN BEHAVIOUR ARREST: Sudden freeze */
    case "unknown-arrest": {
      const freeze = Math.min(p * 5, 1);
      const microDrift = Math.sin(t * 0.003) * 1 * freeze;
      return {
        head: { r: microDrift, ty: freeze * 2 },
        torso: {},
        lArm: { r: freeze * 2 },
        rArm: { r: -freeze * 2 },
        lLeg: {},
        rLeg: {},
        jawClench: 0,
        absenceMouth: freeze * 0.4,
      };
    }

    default: return Z;
  }
}

function tf(v) {
  if(!v) return "";
  let s = "";
  if(v.tx) s += `translateX(${v.tx}px) `;
  if(v.ty) s += `translateY(${v.ty}px) `;
  if(v.r) s += `rotate(${v.r}deg) `;
  if(v.sy) s += `scaleY(${v.sy}) `;
  return s.trim();
}

        <circle cx="116.5" cy="49.5" r="1" fill="white" opacity="0.9"/>
        <circle cx="140.5" cy="49.5" r="1" fill="white" opacity="0.9"/>
        <circle cx="119.5" cy="52" r="0.5" fill="white" opacity="0.5"/>
        <circle cx="143.5" cy="52" r="0.5" fill="white" opacity="0.5"/>
        <!-- Upper eyelid crease -->
        <path d="M112 47 Q118 45 124 47" stroke="${skinM}" stroke-width="0.6" fill="none" opacity="0.3"/>
        <path d="M136 47 Q142 45 148 47" stroke="${skinM}" stroke-width="0.6" fill="none" opacity="0.3"/>
        <!-- Lower lash line -->
        <path d="M113 54 Q118 56 123 54" stroke="${skinM}" stroke-width="0.3" fill="none" opacity="0.2"/>
        <path d="M137 54 Q142 56 147 54" stroke="${skinM}" stroke-width="0.3" fill="none" opacity="0.2"/>
      `}

      <!-- Nose with 3D -->
      <path d="M128 54 Q130 63 127 68 Q130 70 133 68 Q130 63 132 54" stroke="${skinM}" stroke-width="0.8" fill="none" opacity="0.4"/>
      <!-- Nose bridge highlight -->
      <path d="M129 55 L129 62" stroke="${skinL}" stroke-width="0.8" fill="none" opacity="0.15"/>
      <!-- Nostrils -->
      <ellipse cx="127" cy="68" rx="2" ry="1.2" fill="${skinM}" opacity="0.15"/>
      <ellipse cx="133" cy="68" rx="2" ry="1.2" fill="${skinM}" opacity="0.15"/>

      <!-- Mouth / Jaw -->
      ${jawClench > 0.1 ? `
        <!-- JAW CLENCHING: masseter muscles bulge, teeth visible, mouth tight -->
        <!-- Masseter muscle bulge on both sides of jaw -->
        <ellipse cx="104" cy="72" rx="${3 + jawClench*4}" ry="${2 + jawClench*3}" fill="${skinM}" opacity="${jawClench*0.35}"/>
        <ellipse cx="156" cy="72" rx="${3 + jawClench*4}" ry="${2 + jawClench*3}" fill="${skinM}" opacity="${jawClench*0.35}"/>
        <!-- Jaw tension lines -->
        <path d="M104 68 Q106 72 104 76" stroke="${skinD}" stroke-width="${0.3 + jawClench*0.6}" fill="none" opacity="${jawClench*0.3}"/>
        <path d="M156 68 Q154 72 156 76" stroke="${skinD}" stroke-width="${0.3 + jawClench*0.6}" fill="none" opacity="${jawClench*0.3}"/>
        <!-- Clenched mouth — tight horizontal line -->
        <path d="M118 77 L142 77" stroke="${skinD}" stroke-width="${1.0 + jawClench*0.8}" fill="none" opacity="${0.3 + jawClench*0.4}"/>
        <!-- Upper teeth row visible through tight lips -->
        <rect x="119" y="${77 - jawClench*2.5}" width="22" height="${jawClench*3}" rx="1" fill="white" opacity="${jawClench*0.6}"/>
        <!-- Lower teeth row -->
        <rect x="119" y="77" width="22" height="${jawClench*2.5}" rx="1" fill="#f0f0f0" opacity="${jawClench*0.5}"/>
        <!-- Individual tooth lines -->
        ${jawClench > 0.4 ? `
          <line x1="123" y1="${77 - jawClench*2}" x2="123" y2="${77 + jawClench*2}" stroke="${skinM}" stroke-width="0.3" opacity="${jawClench*0.35}"/>
          <line x1="127" y1="${77 - jawClench*2}" x2="127" y2="${77 + jawClench*2}" stroke="${skinM}" stroke-width="0.3" opacity="${jawClench*0.35}"/>
          <line x1="130" y1="${77 - jawClench*2}" x2="130" y2="${77 + jawClench*2}" stroke="${skinM}" stroke-width="0.3" opacity="${jawClench*0.35}"/>
          <line x1="133" y1="${77 - jawClench*2}" x2="133" y2="${77 + jawClench*2}" stroke="${skinM}" stroke-width="0.3" opacity="${jawClench*0.35}"/>
          <line x1="137" y1="${77 - jawClench*2}" x2="137" y2="${77 + jawClench*2}" stroke="${skinM}" stroke-width="0.3" opacity="${jawClench*0.35}"/>
        ` : ''}
        <!-- Lip compression lines -->
        <path d="M120 ${76 - jawClench*1} Q130 ${75 - jawClench*1.5} 140 ${76 - jawClench*1}" stroke="${skinM}" stroke-width="0.4" fill="none" opacity="${jawClench*0.3}"/>
        <path d="M120 ${78 + jawClench*1} Q130 ${79 + jawClench*1.5} 140 ${78 + jawClench*1}" stroke="${skinM}" stroke-width="0.4" fill="none" opacity="${jawClench*0.3}"/>
        <!-- Chin dimple from tension -->
        <ellipse cx="130" cy="${83 + jawClench*1}" rx="3" ry="${1 + jawClench}" fill="${skinM}" opacity="${jawClench*0.15}"/>
      ` : isAbsence && absenceMouth > 0.1 ? `
        <!-- ABSENCE: Mouth goes slightly slack/open — vacant expression -->
        <!-- Slightly open mouth — jaw drops a bit -->
        <ellipse cx="130" cy="${78 + absenceMouth*2}" rx="${6 + absenceMouth*2}" ry="${1.5 + absenceMouth*2.5}" fill="#2a1a1a" opacity="${0.15 + absenceMouth*0.2}"/>
        <!-- Upper lip -->
        <path d="M121 ${77 + absenceMouth*0.5} Q126 ${76} 130 ${76} Q134 ${76} 139 ${77 + absenceMouth*0.5}" stroke="${skinM}" stroke-width="1" fill="none" opacity="0.4"/>
        <!-- Lower lip slightly dropped -->
        <path d="M123 ${79 + absenceMouth*3} Q130 ${81 + absenceMouth*3.5} 137 ${79 + absenceMouth*3}" stroke="${skinM}" stroke-width="0.8" fill="none" opacity="0.3"/>
        <!-- Drool-line shadow inside mouth -->
        <ellipse cx="130" cy="${78 + absenceMouth*2}" rx="${4 + absenceMouth*1}" ry="${0.5 + absenceMouth*1.2}" fill="#1a0a0a" opacity="${absenceMouth*0.1}"/>
      ` : `
        <!-- Normal relaxed mouth -->
        <path d="M120 76 Q125 80 130 80 Q135 80 140 76" stroke="${skinM}" stroke-width="1.2" fill="none" opacity="0.4"/>
        <!-- Lower lip highlight -->
        <path d="M123 80 Q130 83 137 80" stroke="${skinL}" stroke-width="0.5" fill="none" opacity="0.15"/>
      `}
      
      <!-- Philtrum -->
      <path d="M128.5 70 L128 75" stroke="${skinM}" stroke-width="0.3" fill="none" opacity="0.1"/>
      <path d="M131.5 70 L132 75" stroke="${skinM}" stroke-width="0.3" fill="none" opacity="0.1"/>

      ${hlOv("M96 15 Q130 4 164 15 L165 58 Q165 96 130 98 Q95 96 95 58 Z","head")}
    </g>
  `;
}

function drawEEG(id, isPlaying, el, color) {
  const c = document.getElementById("eegCanvas");
  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,300,44);
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.globalAlpha=0.8;
  const tm = el*0.001;
  for(let x=0;x<300;x++){
    let y=22;
    if(!isPlaying){y=22+Math.sin(x*0.05+tm)*2;}
    else switch(id){
      case "tonic-clonic":case "tonic":case "unknown-tc":y=22+Math.sin(x*0.15+tm*8)*13+Math.sin(x*0.3+tm*12)*5;break;
      case "clonic":y=22+Math.sin(x*0.12+tm*6)*11+Math.cos(x*0.2+tm*9)*5;break;
      case "myoclonic":y=22+Math.sin(x*0.2+tm*15)*8*(Math.sin(tm*5)>0.7?2:0.5);break;
      case "absence":y=22+Math.sin(x*0.1+tm*3)*7*Math.sin(x*0.05);break;
      case "atypical-absence":y=22+Math.sin(x*0.065+tm*2)*9*Math.sin(x*0.04);break;
      case "myoclonic-absence":y=22+Math.sin(x*0.1+tm*3)*7*Math.sin(x*0.05)+Math.sin(x*0.3+tm*10)*4*(Math.sin(tm*3)>0.3?1:0.2);break;
      case "eyelid-myoclonia":y=22+Math.sin(x*0.12+tm*4)*6+Math.sin(x*0.35+tm*14)*5*(Math.sin(tm*6)>0.4?1.5:0.3);break;
      case "focal":case "focal-impaired":case "focal-nonmotor":y=22+(x>150?Math.sin(x*0.15+tm*7)*11+(Math.random()-0.5)*3:Math.sin(x*0.05+tm)*2);break;
      case "unknown-spasms":case "spasms":y=22+Math.sin(x*0.15+tm*7)*11+(Math.random()-0.5)*4;break;
      case "unknown-arrest":y=22+Math.sin(x*0.08+tm*2)*5+(Math.random()-0.5)*2;break;
      default:y=22+Math.sin(x*0.15+tm*7)*11+(Math.random()-0.5)*4;
    }
    x===0?ctx.moveTo(x,Math.max(2,Math.min(42,y))):ctx.lineTo(x,Math.max(2,Math.min(42,y)));
  }
  ctx.stroke();
}

// Init
render();
updateUI();
</script>
